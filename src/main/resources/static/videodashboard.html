<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>User Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
color:#222;
padding-bottom:90px;
}

/* ================= NAVBAR ================= */

.navbar{
position:sticky;
top:0;
z-index:100;
background:#ffffff;
display:grid;
grid-template-columns:220px 1fr 220px;
align-items:center;
padding:16px 30px;
box-shadow:0 4px 18px rgba(0,0,0,.06);
gap:15px;
}

.logo{
font-size:22px;
font-weight:700;
color:#4c6fff;
}

.search-box{
display:flex;
justify-content:center;
}

.search-box input{
width:100%;
max-width:520px;
padding:12px 16px;
border-radius:12px;
border:1px solid #dfe3f1;
outline:none;
font-size:14px;
}

.profile-btn{
justify-self:end;
display:flex;
align-items:center;
gap:10px;
background:#eef1ff;
padding:8px 14px;
border-radius:30px;
cursor:pointer;
color:#4c6fff;
font-weight:600;
}

.profile-btn img{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
background:#dbe3ff;
}

/* ================= MAIN ================= */

.container{
padding:28px;
}

/* ================= OFFERS ================= */

.offer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:22px;
}

.card{
position:relative;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 35px rgba(76,111,255,.12);
transition:.35s;
border:1px solid #edf0ff;
}

.card:hover{
transform:translateY(-8px) scale(1.01);
box-shadow:0 22px 40px rgba(76,111,255,.18);
}

.offer-badge{
position:absolute;
top:14px;
left:14px;
background:linear-gradient(135deg,#4c6fff,#7d95ff);
color:#fff;
padding:7px 14px;
font-size:12px;
font-weight:700;
border-radius:30px;
z-index:5;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
background:#eef1ff;
}

.card-body{
padding:18px;
}

.card-body h3{
font-size:21px;
color:#4c6fff;
margin-bottom:10px;
}

.card-body p{
font-size:13px;
color:#666;
margin-bottom:12px;
min-height:40px;
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.price{
font-size:22px;
font-weight:700;
}

.slot-box{
background:#eef1ff;
color:#4c6fff;
padding:8px 12px;
border-radius:10px;
font-size:13px;
font-weight:600;
}

.card button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4c6fff,#6f87ff);
color:#fff;
font-weight:700;
cursor:pointer;
font-size:14px;
transition:.3s;
}

.card button:hover{
transform:scale(1.02);
}

/* ================= POPUP ================= */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(8px);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.popup{
background:#fff;
width:100%;
max-width:780px;
border-radius:24px;
padding:26px;
max-height:94vh;
overflow:auto;
box-shadow:0 20px 45px rgba(0,0,0,.18);
animation:popupShow .35s ease;
}

@keyframes popupShow{
from{
opacity:0;
transform:translateY(40px) scale(.92);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.popup img{
width:100%;
height:300px;
object-fit:cover;
border-radius:18px;
margin-bottom:18px;
background:#eef1ff;
}

.popup h2{
color:#4c6fff;
font-size:28px;
margin-bottom:14px;
}

.popup p{
background:#f7f8ff;
padding:10px 14px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
line-height:1.6;
}

.popup button{
margin-top:18px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#4c6fff,#6f87ff);
color:#fff;
cursor:pointer;
font-weight:700;
font-size:16px;
}

/* ================= BOOKINGS ================= */

.booking-item{
background:#fff;
padding:16px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 8px 18px rgba(0,0,0,.05);
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:18px;
}

.tabs button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#eef1ff;
color:#4c6fff;
font-weight:600;
cursor:pointer;
}

/* ================= PROFILE ================= */

.profile-box{
max-width:430px;
margin:auto;
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 10px 22px rgba(0,0,0,.06);
text-align:center;
}

.profile-box img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
background:#eef1ff;
margin-bottom:15px;
}

.profile-box input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
}

.profile-box button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4c6fff;
color:#fff;
cursor:pointer;
font-weight:600;
}

/* ================= FOOTER ================= */

.footer-menu{
position:fixed;
left:12px;
right:12px;
bottom:12px;
background:#ffffff;
border-radius:18px;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
z-index:100;
}

.footer-menu button{
border:none;
background:#eef1ff;
padding:10px 16px;
border-radius:12px;
color:#4c6fff;
font-weight:600;
cursor:pointer;
}

.footer-menu button:hover{
background:#4c6fff;
color:#fff;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.navbar{
grid-template-columns:1fr;
}

.profile-btn{
justify-self:start;
}

.search-box{
justify-content:flex-start;
}

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">🎬 VideoSlotBooking</div>

<div class="search-box">
<input type="text" placeholder="Search offer name..." onkeyup="searchOffer(this.value)">
</div>

<div class="profile-btn" onclick="openPage('profile')">
<img id="navProfileImg" src="">
<span id="navProfileName">Profile</span>
</div>

</div>

<!-- OFFERS PAGE -->



<div id="offersPage" class="container">
<div id="offerGrid" class="offer-grid"></div>
</div>

<!-- BOOKINGS PAGE -->

<div id="bookingsPage" class="container" style="display:none">
<div class="tabs">
<button onclick="loadBookings('all')">All</button>
<button onclick="loadBookings('upcoming')">Upcoming</button>
<button onclick="loadBookings('completed')">Completed</button>
</div>
<div id="bookingList"></div>
</div>

<!-- PROFILE PAGE -->

<div id="profilePage" class="container" style="display:none">

<div class="profile-box">
<img id="profileImage" src="">
<input id="pName" placeholder="Name">
<input id="pPhone" placeholder="Phone Number">
<input id="pEmail" placeholder="Email">
<button onclick="updateProfile()">Update Profile</button>
</div>

</div>

<!-- ISSUE PAGE -->

<div id="issuesPage" class="container" style="display:none">

<div class="profile-box">
<input id="issueTitle" placeholder="Issue Title">
<input id="issueDesc" placeholder="Issue Description">
<button onclick="addIssue()">Submit Issue</button>
</div>

</div>

<!-- POPUP -->

<div id="overlay" class="overlay">

<div class="popup">

<div style="text-align:right;font-size:22px;cursor:pointer" onclick="closePopup()">✖</div>

<img id="pImg">
<h2 id="pTitle"></h2>
<p id="pDesc"></p>

<p><b>Amount:</b> ₹<span id="pAmount"></span></p>
<p><b>Discount:</b> <span id="pDiscount"></span>%</p>
<p><b>Slots:</b> <span id="pSlot"></span></p>
<p><b>Duration:</b> <span id="pDuration"></span></p>

<hr style="margin:15px 0">

<!-- 🔥 BOOKING SECTION -->

<label>Select Date</label>
<input type="date" id="bDate" style="width:100%;padding:10px;margin-bottom:10px">

<label>Select Start Time</label>
<input type="time" id="bStart" style="width:100%;padding:10px;margin-bottom:10px">

<label>Duration</label>
<input id="bDuration" disabled style="width:100%;padding:10px;margin-bottom:10px">

<label>Email</label>
<input id="bEmail" disabled style="width:100%;padding:10px;margin-bottom:10px">

<label>Phone</label>
<input id="bPhone" disabled style="width:100%;padding:10px;margin-bottom:10px">

<!-- 🔥 ADMIN CONTACT -->

<hr style="margin:15px 0">

<p style="font-size:14px;color:#444;">
<b>Admin Contact:</b><br>
📞 <a href="tel:9652966734" style="color:#4c6fff;">9652966734</a><br>
📧 <a href="mailto:bhanuprakashreddy@gmail.com" style="color:#4c6fff;">
bhanuprakashreddy@gmail.com
</a>
</p>

<p style="font-size:13px;color:#777;margin-top:10px;">
If you have any issue, please raise it in the <b>Issues Page</b>.
</p>

<!-- 🔥 BUTTON -->

<button onclick="bookSlot()">Confirm Booking</button>

</div>
</div>

</div>

<!-- FOOTER -->

<div class="footer-menu">
<button onclick="openPage('offers')">Offers</button>
<button onclick="openPage('bookings')">Bookings</button>
<button onclick="openPage('issues')">Issues</button>
<button onclick="logout()">Logout</button>
</div>

<script>

	const user = JSON.parse(localStorage.getItem("user"));

	if(!user){
	window.location.href = "videologin.html";
	}

const API = "http://localhost:8080";

let offers = [];
let bookings = [];
let selectedOffer = null;

/* LOAD OFFERS */

function loadOffers(){

fetch(API + "/offers")
.then(res => res.json())
.then(data => {
offers = data;
renderOffers(offers);
});

}

/* RENDER OFFERS */

function renderOffers(data){

offerGrid.innerHTML = "";

if(data.length===0){
offerGrid.innerHTML="<p>No offers available</p>";
return;
}

data.forEach(o=>{

offerGrid.innerHTML += `
<div class="card">

<div class="offer-badge">${o.discount}% OFF</div>

<img src="${o.image || 'https://via.placeholder.com/400x250?text=No+Image'}">

<div class="card-body">

<h3>${o.title}</h3>

<p>${o.smallD}</p>

<div class="price-row">
<div class="price">₹${o.amount}</div>
<div class="slot-box">${o.slot} Slots</div>
</div>

${o.slot > 0 
? `<button onclick='openPopup(${JSON.stringify(o)})'>View More</button>`
: `<button disabled style="background:#ccc;cursor:not-allowed">Slot Full</button>`
}

</div>

</div>
`;

});

}

/* SEARCH */

function searchOffer(text){
let result = offers.filter(o =>
o.title.toLowerCase().includes(text.toLowerCase())
);
renderOffers(result);
}

/* POPUP */

function openPopup(o){

  selectedOffer = o;

  overlay.style.display="flex";

  pImg.src = o.image;
  pTitle.innerText = o.title;
  pDesc.innerText = o.largeD;
  pAmount.innerText = o.amount;
  pDiscount.innerText = o.discount;
  pSlot.innerText = o.slot;
  pDuration.innerText = o.duration;

  // 🔥 AUTO FILL USER DATA
  const user = JSON.parse(localStorage.getItem("user"));

  bEmail.value = user.email || "";
  bPhone.value = user.number || "";

  // 🔥 AUTO FILL DURATION
  bDuration.value = o.duration || "";

}

function closePopup(){
overlay.style.display="none";
}

/* BOOK SLOT */

function bookSlot(){

  const user = JSON.parse(localStorage.getItem("user"));

  const date = bDate.value;
  const start = bStart.value;

  if(!date || !start){
    alert("Please select date and time ❌");
    return;
  }

  // 🔥 FIXED URL (clean + encoded)
const url = `${API}/bookings/book?userId=${user.id}&email=${encodeURIComponent(user.email)}&offerId=${selectedOffer.id}&shootName=${encodeURIComponent(selectedOffer.title)}&date=${date}&startTime=${start}&duration=${encodeURIComponent(selectedOffer.duration)}`;

  fetch(url,{
    method:"POST"
  })
  .then(res=>{
    if(!res.ok) return res.text().then(err=>{throw new Error(err)});
    return res.json();
  })
  .then(()=>{
    alert("Booking Confirmed ✅");
    closePopup();
    loadOffers();
  })
  .catch(err=>{
    console.error(err);
    alert(err.message);
  });

}



function loadBookings(type){

const user = JSON.parse(localStorage.getItem("user"));

fetch(API + "/bookings/user?userId=" + user.id)
.then(res=>res.json())
.then(data=>{

let result = data;

if(type==="upcoming"){
result = data.filter(b=>b.status==="UPCOMING");
}

if(type==="completed"){
result = data.filter(b=>b.status==="COMPLETED");
}

bookingList.innerHTML="";

result.forEach(b=>{
bookingList.innerHTML += `
<div class="booking-item">
<b>${b.shootName}</b><br>
${b.date}<br>
${b.status}
</div>
`;
});

});
}

/* PROFILE */

function loadProfile(){

  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    window.location.href = "videologin.html";
    return;
  }

  fetch(API + "/api/user/profile?userId=" + user.id)
  .then(res => res.json())
  .then(u => {

    console.log("PROFILE DATA:", u);

    document.getElementById("navProfileName").innerText = u.name;
    document.getElementById("pName").value = u.name;
    document.getElementById("pPhone").value = u.number;
    document.getElementById("pEmail").value = u.email;

    let img = "https://via.placeholder.com/150?text=User";

    document.getElementById("navProfileImg").src = img;
    document.getElementById("profileImage").src = img;

  })
  .catch(err => console.error(err));
}
function updateProfile(){

fetch(API + "/user/profile",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:pName.value,
phone:pPhone.value,
email:pEmail.value
})
})
.then(()=>alert("Profile Updated ✅"));

}

/* ISSUE */

function addIssue(){

const user = JSON.parse(localStorage.getItem("user"));

fetch(API + "/issues",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userName: user.name,
email: user.email,
title: issueTitle.value,
description: issueDesc.value
})
})
.then(()=>alert("Issue Submitted ✅"));

}

/* PAGE */

function openPage(page){

offersPage.style.display="none";
bookingsPage.style.display="none";
profilePage.style.display="none";
issuesPage.style.display="none";

if(page==="offers") offersPage.style.display="block";
if(page==="bookings"){
bookingsPage.style.display="block";
loadBookings("all");
}
if(page==="profile") profilePage.style.display="block";
if(page==="issues") issuesPage.style.display="block";

}

/* LOGOUT */

function logout(){
window.location.href="videologin.html";
}

/* INIT */

loadOffers();
loadProfile();

</script>

</body>
</html>
